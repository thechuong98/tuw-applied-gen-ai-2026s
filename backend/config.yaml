# Pipeline config (LLM-agnostic). NOTE: model + temperature selection live in .env, NOT here:
#   MODEL / MODEL_<ROLE>             -> which "provider:model" each agent uses
#   TEMPERATURE / TEMPERATURE_<ROLE> -> sampling temperature per agent
# See .env.example. Local model, offline: set MODEL=ollama:llama3.1 in .env (see README).
# For Google Vertex AI: set GOOGLE_CLOUD_PROJECT and GOOGLE_CLOUD_LOCATION env vars;
# for local dev authenticate via `gcloud auth application-default login`.

# Structured-output method per provider. Local models (Ollama) do tool/function
# calling poorly, so they use json_schema; cloud providers keep function_calling.
# Resolution is by the provider prefix of the model spec ("ollama:" -> json_schema).
structured_output_method:
  default: function_calling     # OpenAI, Google Vertex AI
  ollama:  json_schema          # robust structured output for local Ollama models

loop:
  max_iters: 4                     # max number of times the Defender is allowed to rewrite
  # Leak is decided by the Judge LLM (not a confidence threshold). These are the utility PASS thresholds:
  min_task_utility: 0.6            # PASS threshold for utility
  min_factual: 0.7
  min_format: 0.0                  # set > 0 if you want to strictly enforce keeping the format

weights:                           # scoring for best_candidate when max_iters is reached
  privacy: 0.6
  utility: 0.4

defaults:
  attributes_to_hide:
    - "people's names, initials, nicknames, aliases, usernames"                              # PERSON
    - "identifying numbers/codes — case, SSN, phone, passport, licence, report IDs"          # CODE
    - "places — cities, regions, countries, addresses, named infrastructure"                 # LOC
    - "organisation names — companies, courts, schools, hospitals, NGOs, acronyms"           # ORG
    - "demographics — nationality, ethnicity, language, job/rank, education, diagnosis, age" # DEM
    - "specific dates, times, and durations"                                                 # DATETIME
    - "meaningful quantities — money, percentages, measurements"                             # QUANTITY
    - "other identifying details — products, events, laws, named ideas"                      # MISC
