services:
  backend:
    build: ./backend
    env_file:               # provides OPENAI_API_KEY (copy from .env.example)
      - path: .env
        required: false     # fresh clone has no .env yet — don't fail build/up
    environment:
      - CONFIG_PATH=/app/config.yaml
      - OLLAMA_BASE_URL=http://host.docker.internal:11434  # reach Ollama on the Docker host
      # - MODEL=openai:gpt-5-mini   # uncomment to override every model role at once
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"           # open http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
