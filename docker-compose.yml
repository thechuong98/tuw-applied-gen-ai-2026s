services:
  backend:
    build: ./backend
    env_file: .env          # provides OPENAI_API_KEY (copy from .env.example)
    environment:
      - CONFIG_PATH=/app/config.yaml
      # - MODEL=openai:gpt-5-mini   # uncomment to override every model role at once
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"           # open http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
